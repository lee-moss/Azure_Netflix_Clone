trigger: none

pool:
  vmImage: 'ubuntu-latest'

variables:
  azureSubscription: 'Azure subscription 1'
  resourceGroupName: 'NetflixProject'

jobs:
  - job: TestConnection
    steps:
    - task: AzureCLI@2
      inputs:
        azureSubscription: '$(azureSubscription)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az group show --name $(resourceGroupName)